<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta content="ie=edge" http-equiv="X-UA-Compatible" />
    <title>Around The U.S</title>
    <!-- <link href="./vendor/fonts.css" rel="stylesheet" /> -->
    <link href="./pages/index.css" rel="stylesheet" />
  </head>
  <body class="page">
    <div class="page__content">
      <header class="header page__section">
        <img
          src="./images/logo.svg"
          alt="Around the U.S. Logo"
          class="header__logo"
        />
      </header>
      <main class="content">
        <section class="profile page__section">
          <div class="profile__image-container">
            <img src="./images/jacques.png" alt="Avatar" class="profile__image" />
            <div class="profile__image-overlay" id="profile-avatar-edit-button">
              <img src="./images/Edit-icon.svg" alt="Edit avatar" class="profile__image-edit-icon" />
            </div>
          </div>
          <div class="profile__info">
            <div class="profile__items">
              <h1 class="profile__title">Jacques Cousteau</h1>
              <button
                type="button"
                class="profile__edit-button"
                id="profile-edit-button"
              ></button>
            </div>
            <p class="profile__description">Explorer</p>
          </div>
      <button 
            type="button" 
            class="profile__add-button"
            id="add-card-button"
            aria-label="Add new card"
          ></button>
        </section>
        <section class="cards page__section">
          <ul class="cards__list"></ul>
        </section>
      </main>
      <footer class="footer page__section">
        <p class="footer__copyright">@ 2024 Around The U.S.</p>
      </footer>
    </div>
    <div class="modal" id="profile-edit-modal">
      <div class="modal__container">
        <button class="modal__close" id="profile-close-button"></button>
        <p class="modal__heading">Edit Profile</p>
        <form class="modal__form">
          <input
            type="text"
            class="modal__input"
            id="profile-title-input"
            name="title"
            placeholder="Jacques Cousteau"
          />
          <input
            type="text"
            class="modal__input"
            id="profile-description-input"
            name="description"
            placeholder="Explorer"
          />
          <button class="modal__button-save">Save</button>
        </form>
      </div>
    </div>

<template id="card-template">
  <li class="card">
    <img src="#" alt="#" class="card__image" />
    <div class="card__description">
      <h2 class="card__text"></h2>
      <div class="card__likes">
        <button class="card__like" type="button" aria-label="Like"></button>
        <!-- Inside your card template -->
<button class="card__delete" type="button" aria-label="Delete"></button>
      </div>
    </div>
  </li>
</template>



<div class="modal" id="add-card-modal">
      <div class="modal__container">
        <button class="modal__close" id="add-card-close-button" type="button" aria-label="Close"></button>
        <p class="modal__heading">New place</p>
        <form class="modal__form" novalidate>
          <label class="modal__label">
            <span class="modal__label-text">Title</span>
            <input
              type="text"
              class="modal__input"
              id="card-title-input"
              name="title"
              placeholder="Title"
              required
              minlength="2"
              maxlength="30"
            />
            <span class="modal__error"></span>
          </label>
          <label class="modal__label">
            <span class="modal__label-text">Image link</span>
            <input
              type="url"
              class="modal__input"
              id="card-url-input"
              name="link"
              placeholder="https://"
              required
            />
            <span class="modal__error"></span>
          </label>
          <button class="modal__button-save" type="submit">Create</button>
        </form>
      </div>
    </div>    


    <!-- Avatar Edit Modal -->
    <div class="modal" id="avatar-edit-modal">
      <div class="modal__container">
        <button class="modal__close" id="avatar-edit-close-button" type="button" aria-label="Close"></button>
        <p class="modal__heading">Change Profile Picture</p>
        <form class="modal__form" novalidate>
          <label class="modal__label">
            <span class="modal__label-text">Image link</span>
            <input
              type="url"
              class="modal__input"
              id="avatar-url-input"
              name="avatar"
              placeholder="https://"
              required
            />
            <span class="modal__error"></span>
          </label>
          <button class="modal__button-save" type="submit">Save</button>
        </form>
      </div>
    </div>

    <!-- Image Preview Modal -->
    <div class="modal" id="preview-modal">
      <div class="modal__container modal__container_preview">
        <button class="modal__close" id="preview-close-button" type="button" aria-label="Close"></button>
        <figure class="modal__preview">
          <img src="#" alt="#" class="modal__preview-image" />
          <figcaption class="modal__preview-caption"></figcaption>
        </figure>
      </div>
    </div>

    <script src="./scripts/index.js"></script>
  </body>
</html>
